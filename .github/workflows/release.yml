name: Release

on:
  workflow_dispatch:
  release:
    types: [created]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true


permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            bundles: deb,rpm,appimage
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            bundles: dmg,app
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            bundles: nsis

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event_name == 'release' && github.ref_name || '' }}
          releaseName: "PI Notes ${{ github.ref_name }}"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.rust_target }} --bundles ${{ matrix.bundles }}

      - name: GPG-sign Linux bundles
        if: runner.os == 'Linux'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "::warning::GPG_PRIVATE_KEY not set, skipping signing"
            exit 0
          fi
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          for f in \
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/appimage/*.AppImage \
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/deb/*.deb \
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/rpm/*.rpm; do
            [ -f "$f" ] && gpg --batch --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
              --detach-sign --armor "$f"
          done

      - name: Upload Linux bundle signatures
        if: runner.os == 'Linux' && github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in \
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/appimage/*.asc \
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/deb/*.asc \
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/rpm/*.asc; do
            [ -f "$f" ] && gh release upload "${{ github.ref_name }}" "$f" --clobber
          done
